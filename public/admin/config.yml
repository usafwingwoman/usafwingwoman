backend:
  name: github
  repo: usafwingwoman/usafwingwoman
  branch: main
  base_url: https://usafwingwoman-cms-auth.sagephoenix11.workers.dev

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: string }
      - { label: Featured Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: src/content/pages/home.json
        fields:
          - { label: "Hero — Name", name: hero_name, widget: string }
          - { label: "Hero — Tagline Line 1", name: hero_tagline_1, widget: string }
          - { label: "Hero — Tagline Line 2", name: hero_tagline_2, widget: string }
          - { label: "Origin — Heading Line 1", name: origin_heading_1, widget: string }
          - { label: "Origin — Heading Line 2", name: origin_heading_2, widget: string }
          - { label: "Origin — Paragraph 1", name: origin_p1, widget: text }
          - { label: "Origin — Paragraph 2", name: origin_p2, widget: text }
          - { label: "Origin — Paragraph 3", name: origin_p3, widget: text }
          - { label: "Deployment — Heading Line 1", name: deploy_heading_1, widget: string }
          - { label: "Deployment — Heading Line 2", name: deploy_heading_2, widget: string }
          - { label: "Deployment — Heading Line 3", name: deploy_heading_3, widget: string }
          - { label: "Deployment — Paragraph 1", name: deploy_p1, widget: text }
          - { label: "Deployment — Paragraph 2", name: deploy_p2, widget: text }
          - { label: "Deployment — Paragraph 3", name: deploy_p3, widget: text }
          - { label: "Deployment — Pull Quote", name: deploy_quote, widget: string }
          - { label: "The Turn — Heading Line 1", name: turn_heading_1, widget: string }
          - { label: "The Turn — Heading Line 2", name: turn_heading_2, widget: string }
          - { label: "The Turn — Paragraph 1", name: turn_p1, widget: text }
          - { label: "The Turn — Paragraph 2", name: turn_p2, widget: text }
          - { label: "The Turn — Paragraph 3", name: turn_p3, widget: text }
          - { label: "The Turn — Paragraph 4", name: turn_p4, widget: text }
          - { label: "Phoenix — Heading Line 1", name: phoenix_heading_1, widget: string }
          - { label: "Phoenix — Heading Line 2", name: phoenix_heading_2, widget: string }
          - { label: "Phoenix — Paragraph 1", name: phoenix_p1, widget: text }
          - { label: "Phoenix — Paragraph 2", name: phoenix_p2, widget: text }
          - { label: "Phoenix — Paragraph 3", name: phoenix_p3, widget: text }
          - { label: "Phoenix — Declaration Line 1", name: phoenix_decl_1, widget: string }
          - { label: "Phoenix — Declaration Line 2", name: phoenix_decl_2, widget: string }
          - { label: "Footer — Aeryon URL", name: footer_aeryon_url, widget: string }
