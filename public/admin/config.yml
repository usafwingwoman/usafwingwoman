backend:
  name: github
  repo: usafwingwoman/usafwingwoman
  branch: main
  base_url: https://usafwingwoman-cms-auth.sagephoenix11.workers.dev

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: string }
      - { label: Featured Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    files:
      - label: Site Layout
        name: layout
        file: src/content/pages/layout.json
        fields:
          - label: Sections
            name: sections
            widget: list
            fields:
              - { label: "Section ID", name: id, widget: string, hint: "origin, deployment, theturn, phoenix — or any future section id" }
              - { label: "Display Name", name: label, widget: string }
              - { label: "Enabled", name: enabled, widget: boolean, default: true }

      - label: Home (Hero)
        name: home
        file: src/content/pages/home_hero.json
        fields:
          - { label: "Name", name: hero_name, widget: string }
          - { label: "Tagline Line 1", name: hero_tagline_1, widget: string }
          - { label: "Tagline Line 2", name: hero_tagline_2, widget: string }

      - label: Forged in Combat
        name: origin
        file: src/content/pages/forged_in_combat.json
        fields:
          - { label: "Heading Line 1", name: heading_line1, widget: string }
          - { label: "Heading Line 2", name: heading_line2, widget: string }
          - label: Body Paragraphs
            name: body
            widget: list
            fields:
              - { label: Paragraph, name: text, widget: text }
          - label: Credentials
            name: credentials
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }

      - label: Brace for Turbulence
        name: deployment
        file: src/content/pages/brace_for_turbulence.json
        fields:
          - { label: "Heading Line 1", name: heading_line1, widget: string }
          - { label: "Heading Line 2", name: heading_line2, widget: string }
          - { label: "Heading Line 3", name: heading_line3, widget: string }
          - label: Body Paragraphs
            name: body
            widget: list
            fields:
              - { label: Paragraph, name: text, widget: text }
          - label: Credentials
            name: credentials
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }

      - label: Losing Altitude
        name: theturn
        file: src/content/pages/losing_altitude.json
        fields:
          - { label: "Heading Line 1", name: heading_line1, widget: string }
          - { label: "Heading Line 2", name: heading_line2, widget: string }
          - label: Body Paragraphs
            name: body
            widget: list
            fields:
              - { label: Paragraph, name: text, widget: text }
          - label: Credentials
            name: credentials
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }

      - label: Crash Landing
        name: crashlanding
        file: src/content/pages/crash_landing.json
        fields:
          - { label: "Heading Line 1", name: heading_line1, widget: string }
          - { label: "Heading Line 2", name: heading_line2, widget: string }
          - label: Body Paragraphs
            name: body
            widget: list
            fields:
              - { label: Paragraph, name: text, widget: text }
          - label: Credentials
            name: credentials
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }

      - label: Clearing the Wreckage
        name: clearingwreckage
        file: src/content/pages/clearing_wreckage.json
        fields:
          - { label: "Heading Line 1", name: heading_line1, widget: string }
          - { label: "Heading Line 2", name: heading_line2, widget: string }
          - label: Body Paragraphs
            name: body
            widget: list
            fields:
              - { label: Paragraph, name: text, widget: text }
          - label: Credentials
            name: credentials
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }

      - label: Phoenix (Rebirth)
        name: phoenix
        file: src/content/pages/phoenix_rebirth.json
        fields:
          - { label: "Heading Line 1", name: heading_line1, widget: string }
          - { label: "Heading Line 2", name: heading_line2, widget: string }
          - label: Body Paragraphs
            name: body
            widget: list
            fields:
              - { label: Paragraph, name: text, widget: text }
          - { label: "Declaration Line 1", name: declaration_line1, widget: string }
          - { label: "Declaration Line 2", name: declaration_line2, widget: string }
          - { label: "Venture Label", name: venture_label, widget: string, required: false }
          - { label: "Venture Link Text", name: venture_text, widget: string, required: false }
          - { label: "Venture URL", name: venture_url, widget: string, required: false }
          - label: Credentials
            name: credentials
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }

      - label: Footer
        name: footer
        file: src/content/pages/footer.json
        fields:
          - { label: "Name", name: name, widget: string }
          - { label: "Subtitle", name: sub, widget: string }
          - { label: "Aeryon URL", name: aeryon_url, widget: string }
          - { label: "Aeryon Link Text", name: aeryon_label, widget: string }
          - { label: "Copyright Line", name: copyright, widget: string }

  - name: stories
    label: Stories
    folder: src/content/stories
    create: true
    slug: "{{slug}}"
    media_folder: /public/images/stories
    public_folder: /images/stories
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
